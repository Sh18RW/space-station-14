- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseAssassinObjective
  components:
  - type: Objective
    issuer: syndicate
  - type: RoleRequirement
    roles:
      components:
      - AssassinRole

# state

- type: entity
  noSpawn: true
  parent: [BaseAssassinObjective, BaseLivingObjective]
  id: AssassinEscapeShuttleObjective
  name: Escape to centcom alive and unrestrained.
  description: One of our undercover agents will debrief you when you arrive. Don't show up in cuffs.
  components:
  - type: Objective
    difficulty: 1
    icon:
      sprite: Structures/Furniture/chairs.rsi
      state: shuttle
  - type: EscapeShuttleCondition

- type: entity
  noSpawn: true
  parent: [BaseAssassinObjective, BaseKillObjective]
  id: AssassinKillRandomHeadObjective
  description: We need this head gone and you probably know why. Good luck, agent.
  components:
  - type: Objective
    # technically its still possible for KillRandomPersonObjective to roll a head but this is guaranteed, so higher difficulty
    difficulty: 1
  - type: TargetObjective
    title: objective-condition-kill-head-title
  - type: PickRandomHead
  - type: KillPersonCondition
    requireDead: true
